# Teleport Access Lists. Each list grants its members a Teleport role and
# carries a recurring review cadence. BAMOE adds users as members based on
# the business workflow.

kind: access_list
version: v1
metadata:
  name: maximo-engineers
  labels:
    business-unit: 'asset-management'
spec:
  title: 'Maximo Engineers'
  description: 'Personnel with engineer-level Maximo access'
  owners:
    - name: 'admin'
      description: 'Default owner'
  audit:
    recurrence:
      frequency: '3months'
  membership_requires:
    roles: []
  ownership_requires:
    roles: []
  grants:
    roles:
      - maximo-engineer
    traits: {}
---
kind: access_list
version: v1
metadata:
  name: maximo-planners
spec:
  title: 'Maximo Planners'
  description: 'Personnel with planner-level Maximo access'
  owners:
    - name: 'admin'
  audit:
    recurrence:
      frequency: '3months'
  grants:
    roles:
      - maximo-planner
    traits: {}
---
kind: access_list
version: v1
metadata:
  name: maximo-supervisors
