---
kind: access_list
version: v1
metadata:
  name: maximo-viewers
spec:
  title: 'Maximo Viewers'
  description: 'Read-only access to Maximo'
  owners:
    - name: 'admin'
  audit:
    recurrence:
      frequency: '6months'
  grants:
    roles:
      - maximo-viewer
    traits: {}
