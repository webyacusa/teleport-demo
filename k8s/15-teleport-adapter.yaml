---
# Placeholder Secret — the real one is created by 03-deploy.sh from the
# identity file generated by 02b-bootstrap-tenant.sh. The awk filter in
# 03-deploy.sh skips this document.
apiVersion: v1
kind: Secret
metadata:
  name: teleport-bot-identity
  namespace: bamoe-demo
type: Opaque
data:
  identity: 'PLACEHOLDER_FILLED_AT_DEPLOY_TIME'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teleport-adapter
  namespace: bamoe-demo
  labels: { app: teleport-adapter }
spec:
  replicas: 1
  selector:
    matchLabels: { app: teleport-adapter }
  template:
    metadata:
      labels: { app: teleport-adapter }
    spec:
      containers:
        - name: teleport-adapter
          image: teleport-demo/teleport-adapter:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            # NEW: point at the Cloud trial tenant instead of an in-cluster
            # Teleport pod. The identity file authenticates us; no other
            # credentials are needed.
            - { name: TELEPORT_AUTH_SERVER,   value: 'yellow-glitter.trial.teleport.sh:443' }
            - { name: TELEPORT_CLUSTER_NAME,  value: 'yellow-glitter.trial.teleport.sh' }
            - { name: TELEPORT_IDENTITY_FILE, value: '/etc/teleport/identity' }
          volumeMounts:
            - { name: identity, mountPath: /etc/teleport, readOnly: true }
          ports:
            - { containerPort: 3500, name: http }
          readinessProbe:
            httpGet: { path: /health, port: 3500 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: identity
          secret:
            secretName: teleport-bot-identity
            items:
              - { key: identity, path: identity }
---
apiVersion: v1
kind: Service
metadata:
  name: teleport-adapter
  namespace: bamoe-demo
spec:
  selector: { app: teleport-adapter }
  ports:
    - { port: 3500, targetPort: 3500 }
