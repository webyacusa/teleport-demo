    matchLabels: { app: training-lms-mock }
  template:
    metadata:
      labels: { app: training-lms-mock }
    spec:
      containers:
        - name: training-lms-mock
          image: teleport-demo/training-lms-mock:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 3001, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: training-lms-mock
  namespace: bamoe-demo
spec:
