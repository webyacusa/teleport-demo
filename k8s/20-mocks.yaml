---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sailpoint-mock
  namespace: bamoe-demo
  labels: { app: sailpoint-mock }
spec:
  replicas: 1
  selector:
    matchLabels: { app: sailpoint-mock }
  template:
    metadata:
      labels: { app: sailpoint-mock }
    spec:
      containers:
        - name: sailpoint-mock
          image: teleport-demo/sailpoint-mock:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: BAMOE_URL, value: "http://bamoe-service:8080" }
          ports:
            - { containerPort: 3000, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: sailpoint-mock
  namespace: bamoe-demo
spec:
  selector: { app: sailpoint-mock }
  ports:
    - { port: 3000, targetPort: 3000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-lms-mock
  namespace: bamoe-demo
  labels: { app: training-lms-mock }
spec:
  replicas: 1
