---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bamoe-ingress
  namespace: bamoe-demo
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: 'true'
    nginx.ingress.kubernetes.io/cors-allow-origin: '*'
    nginx.ingress.kubernetes.io/cors-allow-methods: 'GET, POST, PUT, DELETE, OPTIONS'
    nginx.ingress.kubernetes.io/cors-allow-headers: 'DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization'
spec:
  ingressClassName: nginx
  rules:
    - host: operator.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: operator-ui, port: { number: 80 } }

    - host: bamoe.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: bamoe-service, port: { number: 8080 } }

    - host: teleport.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: teleport, port: { number: 3080 } }

    - host: sailpoint.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: sailpoint-mock, port: { number: 3000 } }

    - host: training.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: training-lms-mock, port: { number: 3001 } }

    - host: notification.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: notification-mock, port: { number: 3003 } }
